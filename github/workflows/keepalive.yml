name: Keep Render Warm

# Pings the Decagent console so Render's free tier never hits its
# 15-minute idle spin-down. Free on public repos (unlimited Actions minutes).
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min (GitHub may delay this under load)
  workflow_dispatch:          # manual "Run workflow" button for instant testing

# don't let slow runs pile up on top of each other
concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Ping console twice (~5 min apart) to cover cron jitter
        run: |
          URL="https://decagent-console.onrender.com/"
          for i in 1 2; do
            echo "Ping $i at $(date -u)"
            code=$(curl -sS -o /dev/null -w '%{http_code}' -m 120 --retry 2 --retry-delay 15 "$URL" || echo "000")
            echo "  -> HTTP $code"
            if [ "$i" -eq 1 ]; then sleep 300; fi
          done
